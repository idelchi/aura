<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aura</title>
  <script src="/htmx.min.js"></script>
  <script src="/htmx-sse.js"></script>
  <link rel="stylesheet" href="/chroma.css">
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-surface: #16213e;
      --bg-input: #0f1629;
      --text: #e0e0e0;
      --text-muted: #888;
      --text-accent: #e8b84a;
      --text-user: #6ba3e8;
      --border: #333;
      --tool-bg: #1a2740;
      --error: #e85050;
      --success: #50c878;
      --dialog-bg: #1e2a44;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Fira Code", monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* SSE container — flex passthrough */
    [hx-ext="sse"] {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* Status bar */
    #status {
      background: var(--bg-surface);
      padding: 6px 16px;
      font-size: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .status-line { color: #8888cc; }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scroll-behavior: smooth;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--bg-surface);
    }
    .message.user { background: var(--bg-input); border-left: 3px solid var(--text-user); }
    .message.assistant { border-left: 3px solid var(--text-accent); }

    .role {
      font-weight: bold;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .message.user .role { color: var(--text-user); }
    .message.assistant .role { color: var(--text-accent); }

    .parts { line-height: 1.6; }

    /* Rendered markdown */
    .content { white-space: pre-wrap; word-wrap: break-word; }
    .content.rendered { white-space: normal; }
    .content.rendered p { margin-bottom: 8px; }
    .content.rendered strong { color: #fff; }
    .content.rendered em { color: #ccc; font-style: italic; }
    .content.rendered code {
      background: #2a2a4e;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: "Fira Code", monospace;
    }
    .content.rendered pre {
      background: #2d2d2d;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .content.rendered pre code {
      background: none;
      padding: 0;
    }
    .content.rendered ul, .content.rendered ol {
      padding-left: 24px;
      margin-bottom: 8px;
    }
    .content.rendered li { margin-bottom: 2px; }
    .content.rendered h1, .content.rendered h2, .content.rendered h3 {
      margin: 16px 0 8px;
      color: #fff;
    }
    .content.rendered h1 { font-size: 1.4em; }
    .content.rendered h2 { font-size: 1.2em; }
    .content.rendered h3 { font-size: 1.1em; }
    .content.rendered blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }
    .content.rendered table {
      border-collapse: collapse;
      margin: 8px 0;
    }
    .content.rendered th, .content.rendered td {
      border: 1px solid var(--border);
      padding: 6px 12px;
    }
    .content.rendered th { background: var(--bg-input); }
    .content.rendered a { color: var(--text-user); }

    /* Thinking */
    .thinking { margin: 4px 0; }
    .thinking summary {
      cursor: pointer;
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.9em;
    }
    .thinking-content {
      color: var(--text-muted);
      font-size: 0.9em;
      white-space: pre-wrap;
      padding: 8px 0 8px 12px;
      border-left: 2px solid var(--border);
      margin-top: 4px;
    }

    /* Tool calls */
    .tool-call {
      background: var(--tool-bg);
      border-radius: 6px;
      padding: 8px 12px;
      margin: 6px 0;
      font-size: 0.9em;
    }
    .tool-header { color: #6bc5d2; font-weight: bold; }
    .tool-args {
      color: var(--text-muted);
      font-size: 0.85em;
      margin-top: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
    .tool-result {
      color: var(--text-muted);
      font-size: 0.85em;
      margin-top: 4px;
      border-top: 1px solid var(--border);
      padding-top: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
    .tool-error {
      color: var(--error);
      font-size: 0.85em;
      margin-top: 4px;
      border-top: 1px solid var(--border);
      padding-top: 4px;
    }

    /* Command results */
    .command-result {
      margin: 8px 0;
      padding: 8px 12px;
      background: var(--bg-surface);
      border-radius: 6px;
      border-left: 3px solid var(--text-muted);
    }
    .command-name { color: var(--text-muted); font-size: 0.9em; margin-bottom: 4px; }
    .command-message { white-space: pre-wrap; }

    /* Errors */
    .error { color: var(--error); font-weight: bold; }

    /* Spinner */
    #spinner {
      padding: 0 16px;
      min-height: 0;
      flex-shrink: 0;
    }
    .spinner-text {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.9em;
      padding: 4px 0;
    }

    /* Dialogs */
    dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--dialog-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      z-index: 100;
    }
    dialog::backdrop { background: rgba(0, 0, 0, 0.6); }
    .dialog-question { margin-bottom: 16px; font-size: 1.05em; }
    .dialog-detail {
      background: var(--bg-input);
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 0.9em;
      overflow-x: auto;
    }
    .diff-preview {
      max-height: 60vh;
      overflow-y: auto;
      margin-bottom: 1rem;
      font-family: monospace;
      font-size: 0.85em;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.5rem;
    }
    .dialog-content { display: flex; flex-direction: column; gap: 8px; }
    .dialog-btn {
      background: var(--bg-surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
      text-align: left;
      transition: background 0.15s;
    }
    .dialog-btn:hover { background: #2a3a5e; }
    .dialog-btn.allow { border-color: var(--success); }
    .dialog-btn.deny { border-color: var(--error); }

    /* Input area */
    #input-area {
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }
    #input-form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #input-text {
      flex: 1;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 200px;
    }
    #input-text:focus { border-color: var(--text-accent); }
    #send-btn {
      background: var(--text-accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div hx-ext="sse" sse-connect="/events">
    <!-- Status bar -->
    <div id="status" sse-swap="status" hx-swap="innerHTML">Connecting...</div>

    <!-- Messages -->
    <div id="messages" sse-swap="message.started,message.added" hx-swap="beforeend"></div>

    <!-- OOB sinks (hidden, process OOB swaps from SSE data) -->
    <div id="_part-sink" sse-swap="message.part" hx-swap="none" style="display:none"></div>
    <div id="_update-sink" sse-swap="message.update" hx-swap="none" style="display:none"></div>
    <div id="_finalize-sink" sse-swap="message.finalized" hx-swap="none" style="display:none"></div>
    <div id="_done-sink" sse-swap="assistant.done" hx-swap="none" style="display:none"></div>

    <!-- Command results appended to messages -->
    <div id="_cmd-sink" sse-swap="command.result" hx-swap="none" style="display:none"></div>

    <!-- Spinner -->
    <div id="spinner" sse-swap="spinner" hx-swap="innerHTML"></div>

    <!-- Live tool output -->
    <div id="tool-output" sse-swap="tool.output" hx-swap="innerHTML"></div>

    <!-- Ask dialog -->
    <div id="ask-container" sse-swap="ask" hx-swap="innerHTML"></div>

    <!-- Confirm dialog -->
    <div id="confirm-container" sse-swap="confirm" hx-swap="innerHTML"></div>
  </div>

  <!-- Input -->
  <div id="input-area">
    <form id="input-form" hx-post="/send" hx-swap="none">
      <textarea id="input-text" name="text" rows="1" placeholder="Type a message..." autocomplete="off" autofocus></textarea>
      <button id="send-btn" type="submit">Send</button>
    </form>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const inputText = document.getElementById('input-text');
    const inputForm = document.getElementById('input-form');

    // Auto-scroll to bottom on new content.
    const observer = new MutationObserver(() => {
      messages.scrollTop = messages.scrollHeight;
    });
    observer.observe(messages, { childList: true, subtree: true, characterData: true });

    // Input history (up/down arrow).
    const history = [];
    let historyIndex = -1;
    let savedInput = '';

    // Clear input and record history after successful send.
    inputForm.addEventListener('htmx:afterRequest', (e) => {
      if (e.detail.successful) {
        const text = inputText.value.trim();
        if (text && (history.length === 0 || history[history.length - 1] !== text)) {
          history.push(text);
        }
        historyIndex = -1;
        savedInput = '';
        inputText.value = '';
        inputText.style.height = 'auto';
        inputText.focus();
      }
    });

    // Submit on Enter (Shift+Enter for newline), history on Up/Down.
    inputText.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (inputText.value.trim()) {
          htmx.trigger(inputForm, 'submit');
        }
        return;
      }

      // Only handle up/down when on a single line (no multiline editing interference).
      if (e.key === 'ArrowUp' && history.length > 0 && inputText.value.indexOf('\n') === -1) {
        e.preventDefault();
        if (historyIndex === -1) {
          savedInput = inputText.value;
          historyIndex = history.length - 1;
        } else if (historyIndex > 0) {
          historyIndex--;
        }
        inputText.value = history[historyIndex];
        return;
      }

      if (e.key === 'ArrowDown' && historyIndex !== -1) {
        e.preventDefault();
        if (historyIndex < history.length - 1) {
          historyIndex++;
          inputText.value = history[historyIndex];
        } else {
          historyIndex = -1;
          inputText.value = savedInput;
        }
        return;
      }
    });

    // Auto-resize textarea.
    inputText.addEventListener('input', () => {
      inputText.style.height = 'auto';
      inputText.style.height = Math.min(inputText.scrollHeight, 200) + 'px';
    });

    // Command results: append to messages via OOB from _cmd-sink.
    // We handle this in JS since the sink receives non-OOB data.
    document.body.addEventListener('htmx:sseMessage', (e) => {
      if (e.detail.type === 'command.result' && e.detail.data) {
        const div = document.createElement('div');
        div.innerHTML = e.detail.data;
        messages.appendChild(div.firstElementChild || div);
      }
    });

    // Cancel button via Escape key.
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        fetch('/cancel', { method: 'POST' });
      }
    });
  </script>
</body>
</html>
