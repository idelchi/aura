name: release

on:
  workflow_dispatch:
  push:
    # For the release
    tags:
      - "*"
      - "!*-beta"
    # For the docker image
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-24.04
    container: goreleaser/goreleaser-cross:v1.26.0
    if: startsWith(github.ref, 'refs/tags/')
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.1

      - name: Git Safe Directory
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}

      - name: Release
        run: goreleaser release --clean --config .goreleaser.yaml

  docker:
    uses: idelchi/devenv/.github/workflows/docker.yml@main
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: write
    secrets: inherit
    with:
      platforms: linux/amd64,linux/arm64
      args: |
        AURA_VERSION=${{
          startsWith(github.ref, 'refs/tags/') && github.ref_name ||
          format('{0}:{1}', github.head_ref || github.ref_name, github.sha)
        }}
