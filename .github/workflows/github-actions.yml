name: aura

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  info:
    uses: idelchi/devenv/.github/workflows/info.yml@main

  test:
    needs: info
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          check-latest: true

      - name: Test the application
        run: go test ./...
